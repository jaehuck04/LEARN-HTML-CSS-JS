<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Basic</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .flex-container {
            background-color: green;
            height: 100vh;
            display: flex;
            /* flex-direction: row;
            flex-wrap: wrap; */
            flex-flow: row wrap;
            /* justify-content: space-between; */
            /* align-content: space-around; */
            align-items: flex-end;
        }

        .flex-item {
            color: white;
            width: 80px;
            height: 80px;
            background-color: #ce43ec;
            text-align: center;
            border: 1px solid yellow;
        }
    </style>

</head>

<body>
    <div class="flex-container">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
        <div class="flex-item">5</div>
        <div class="flex-item">6</div>
        <div class="flex-item">7</div>
        <div class="flex-item">8</div>
        <div class="flex-item">9</div>
        <div class="flex-item">10</div>
        <div class="flex-item">11</div>
        <div class="flex-item">12</div>
        <div class="flex-item">13</div>
        <div class="flex-item">14</div>
        <div class="flex-item">15</div>
    </div>
</body>

</html>



<!-- flex container 속성 -->
<!-- 

전체적인 정렬이나 흐름에 관련된 속성

display
flex-direction
flx-wrap
flex-flow
justify-content
align-items
align-content

-->

<!-- 

(1)
flex-direction: flex container의 main axis 방향 설정
row: 좌에서 우로 수평 배치(flex-direction 속성의 기본값)
row-reverse: 우에서 좌로 수평 배치
column: 위에서 아래로 수직 배치
column-reverse: 아래에서 위로 수직 배치


(2)
flex-wrap: 
flex container의 자식 요소인 여러 개의 flex item을 한 줄로 또는 여러 줄로 배치
flex container의 width보다 flex item들의 width의 합계가 더 큰 경우, 한 줄로 표현할 것인지, 여러 줄로 표현할 것인지를 지정

nowrap: flex item을 개행하지 않고 1행에 배치(flex-wrap 속성의 기본값)
cf. flex item들의 width의 합계가 flex container의 width보다 큰 경우 flex container를 넘치게 된다.
이때, overflow: auto;를 지정하면 가로 스크롤이 생기며 컨테이너에 넘치지 않는다.

wrap: flex item들의 width의 합계가 flex container의 width보다 큰 경우, flex item을 개행하여 배치(기본적으로 좌에서 우, 위에서 아래로 배치)
wrap-reverse: wrap과 동일하나 아래에서 위로 배치


(3)
flex-flow:
flex-direction 속성과 flex-wrap 속성을 설정하기 위한 단축 속성(기본값은 row nowrap)
=> flex-flow: <flex-direction> || <flex-wrap>;




(4)메인축 기준 수평 정렬
justify-content:
flex container의 main axis를 기준으로 flex item을 수평 정렬

flex-start: main start(좌측) 기준으로 정렬(기본값)
flex-end: main end(우측) 기준으로 정렬
center: flex container의 중앙에 정렬
space-between: 첫 번째와 마지막 flex item은 좌우 측면에 정렬되고 나머지는 균등한 간격으로 정렬
space-around: 모든  flex item은 균등한 간격으로 정렬



(5)교차축 기준 수직 정렬
align-content: 
flex container의 cross axis를 기준으로 flex item을 수직 정렬
cf. justisfy-content 속성은 flex container의 main axis를 기준으로 flex item을 수평 정렬

stretch: 모든 flex item은 flex item의 행 이후에 균등하게 분배된 공간에 정렬되어 배치(align-content 속성의 기본값)
flex-start: 모든 flex item은 flex container의 cross start 기준으로 stack 정렬
flex-end: 모든 flex item은 flex container의 cross end 기준으로 stack 정렬
center: 모든 flex item은 flex container의 cross axis의 중앙에 stack 정렬
space-between: 첫 번째 flex item의 행은 flex container의 상단에, 마지막 flex item의 행은 flex container의 하단에 배치되며 나머지 행은 균등 분할된 공간 내에 배치 정렬
space-around: 모든 flex item은 균등 분할된 공간 내에 배치 정렬


(6)
align-items: flex item을 flex container의 수직 방향(cross axis)으로 정렬
align-items 속성은 모든 flex item에 적용

stretch: 모든 flex item은 flex container의 높이(cross start에서 cross end까지의 높이)에 꽉찬 높이를 갖음(algin-items 속성의 기본값)
flex-stat: 모든 flex item은 flex container의 cross start 기준으로 정렬
flex-end: 모든 flex item은 flex container의 cross end 기준으로 정렬
center: 모든 flex item은 flex container의 cross axis의 중앙에 정렬
baseline: 모든 flex item은 flex container의 baseline 기준으로 정렬

cf.
align-items는 flex line을 기준으로 정렬하는 반면,
align-content는 flex line을 정렬

-->
