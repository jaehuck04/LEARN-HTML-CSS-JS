<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Style 1</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap');

        /* * {
            margin: 0px;
            padding: 0px;
        } */

        html {
            font-family: "Nanum Gothic", sans-serif;
            font-size: 16px;
        }

        .title {
            font-size: 28px;
            color: rgb(30, 30, 151);
        }

        .content {
            font-size: 18px;
        }

        .font-italic {
            font-style: italic;
        }

        .font-weight-bold {
            font-weight: bold;
        }

        .font-weight-300 {
            font-weight: 300;
        }

        .font-variant {
            font-variant: small-caps;
        }



        .subtitle {
            font-size: 20px;
        }

        .subtitle-rem {
            font-size: 2rem;
            /* 최상위 태그: 16px */
            /* 2rem -> 2 x 16px-> 32px */
        }

        .subtitle-em {
            font-size: 2em;
            /* 자기자신의 태그: 10px (부모 태그로부터 상속받음) */
            /* 2em -> 2 x 10px-> 20px */
        }

        .article {
            font-size: 10px;
        }

        .rectangle.width {
            width: 100vw;
            height: 100px;
            background-color: yellow;
        }

        .rectangle.height {
            height: 20vh;
            width: 100px;
            background-color: blue;
        }
    </style>
</head>

<body>
    <h2 class="title">유튜브 짐코딩 채널</h2>
    <p class="content">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>
    <p class="content font-italic">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>
    <p class="content font-weight-bold">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>
    <p class="content font-weight-300">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>
    <p class="content font-variant">HELOO, gymcoding</p>

    <hr>

    <h2>px</h2>
    <p class="subtitle">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>

    <h2>rem</h2>
    <p class="subtitle-rem">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>

    <div class="article">
        <h2>em</h2>
        <p class="subtitle-em">실용적인 코딩 컨텐츠를 만들어가는 짐코딩입니다.</p>
    </div>


    <hr>
    <!-- Viewport Width -->
    <h2>vw</h2>
    <div class="rectangle width"></div>

    <!-- Viewport Height -->
    <h2>vh</h2>
    <div class="rectangle height"></div>


</body>

</html>



<!-- 글꼴 관련 속성 -->
<!--

font-family
font-size
font-style
font-weight
font-variant

 -->


<!-- 단위 -->
<!-- 

px: 픽셀 단위
rem: 루트 요소의 글꼴 크기
em: 요소의 글꼴 크기

vw: viewport 너비의 1%
vh: viewport 높이의 1%

 -->
