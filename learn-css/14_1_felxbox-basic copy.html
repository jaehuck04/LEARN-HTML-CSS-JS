<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Basic</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .flex-container {
            background-color: green;
            height: 100vh;
            display: flex;
            /* flex-direction: row;
            flex-wrap: wrap; */
            flex-flow: row wrap;
        }

        .flex-item {
            color: white;
            width: 80px;
            height: 80px;
            background-color: #ce43ec;
            text-align: center;
            border: 1px solid yellow;
        }
    </style>

</head>

<body>
    <div class="flex-container">
        <div class="flex-item">1</div>
        <div class="flex-item">2</div>
        <div class="flex-item">3</div>
        <div class="flex-item">4</div>
        <div class="flex-item">5</div>
        <div class="flex-item">6</div>
        <div class="flex-item">7</div>
        <div class="flex-item">8</div>
        <div class="flex-item">9</div>
        <div class="flex-item">10</div>
        <div class="flex-item">11</div>
        <div class="flex-item">12</div>
        <div class="flex-item">13</div>
        <div class="flex-item">14</div>
        <div class="flex-item">15</div>
    </div>
</body>

</html>



<!-- flexbox -->
<!-- 

flex container
flex item

-->


<!-- felxbox 주축 -->
<!--
 
flex item은 주축(main axis)에 따라 정렬된다.
주축의 방향은 flex container의 flex-direction 속성으로 결정된다.(기본값: row)

row: 주축의 방향이 왼쪽에서 오른쪽 방향이며, 주축의 방향에 따라 flex item이 정렬된다.
col: 주축의 방향이 위에서 아래 방향이며, 주축의 방향에 따라 flex item이 정렬된다.

=>
flex-direction: row;
flex-direction: col;

-->
