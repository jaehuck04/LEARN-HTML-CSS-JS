<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio&Checkbox</title>
</head>

<body>
    <form action="/signup">
        <fieldset>
            <legend>좋아하는 색상을 모두 선택해주세요.</legend>
            <ul>
                <li>
                    <label for="red">빨강</label>
                    <!-- input[type=checkbox][id="red"][vlaue=red] -->
                    <input type="checkbox" id="red" value="red">
                </li>
                <li>
                    <label for="orange">주황</label>
                    <input type="checkbox" id="orange" value="orange">
                </li>
                <li>
                    <label for="yellow">노랑</label>
                    <input type="checkbox" id="yellow" value="yellow">
                </li>
                <li>
                    <label for="green">초록</label>
                    <input type="checkbox" id="green" value="green">
                </li>
                <li>
                    <label for="blue">파랑</label>
                    <input type="checkbox" id="blue" value="blue">
                </li>
            </ul>
        </fieldset>

        <fieldset>
            <legend>배송 방법은?</legend>
            <ul>
                <li>
                    <label for="free">무료</label>
                    <input type="radio" name="delivery" id="free" value="free">
                </li>
                <li>
                    <label for="pay">유료</label>
                    <input type="radio" name="delivery" id="pay" value="pay">
                </li>
            </ul>
        </fieldset>

        <fieldset>
            <legend>자기소개서</legend>
            <textarea name="" id="" cols="30" rows="10"></textarea>
        </fieldset>

        <fieldset>
            <legend>주문 상품을 선택해주세요!</legend>
            <ul>
                <li>
                    <select name="goods" id="goods">
                        <option value="apple_10kg">사과10kg</option>
                        <option value="apple_20kg">사과20kg</option>
                        <option value="apple_30kg">사과30kg</option>
                        <option value="apple_40kg">사과40kg</option>
                        <option value="apple_5s0kg">사과50kg</option>
                    </select>
                </li>
                <li>
                    <label for="ice-cream-choice">맛을 선택하세요</label>
                    <input list="ice-cream-flavors" id="ice-cream-choice" name="ice-cream-choice">
                    <datalist id="ice-cream-flavors">
                        <option value="Chocolate">
                        <option value="Coconut">
                        <option value="Mint">
                        <option value="Strawberry">
                        <option value="Vanilla">
                    </datalist>
                </li>
            </ul>
        </fieldset>

        <button type="submit">제출하기</button>
        <button type="reset">리셋하기</button>
        <button type="button" onclick="alert('Hello World~!')">버튼</button>

    </form>
</body>

</html>



<!-- 

CheckBox
여러개의 체크박스 항목 중 2개 이상 선택 할 수 있음

체크박스 선택 시 선택된 체크박스의 value 값이 서버로 전송된다.

radio
여러개의 라디오 항목 중 1개를 선택 할 수 있다.

그리고 라디오 항목 선택 시 선택된 항목의 value값이 서버로 전송된다.

여러개 중 하나를 선택되게 하려면 그 여러 항목의 radio name ='' 의 name 속성 값을 같은 값으로 해야 한다.


checkbox 는 여러개 중복 선택하여 서버로 제출
radio 는 여러개 중 단일 선택하여 서버로 제출

radio 의 경우 단일 선택하기 위해서 다양한 input 값들을 같은 name 으로 그룹핑 해야 단일 선택이 가능

-->



<!-- 

Textarea
<textarea> 의 경우 여러줄의 데이터를 입력받을 수 있음

속성
rows : 화면에 표시되는 행 수를 지정
cols : 화면에 표시되는 열 수를 지정
name : textarea 가 서버로 제출 될 때 같이 제출 되는 이름
<textarea>콘텐츠</textarea> 를 통해서 기본적으로 textarea 에 내용을 적어둘 수도, placeholder로 미리쓰기처럼 나타낼 수도 있음




Select
<select> 태그는 옵션 메뉴를 제공한다.
<option> 태그로 각 항목을 나타내며 <select> 태그는 <option> 태그를 감싼다

속성
selected 해당 속성은 현재 select 요소에서 선택된 항목(<option>) 을 가리킨다.


datalist
다른 컨트롤에서 고를 수 있는 가능한, 혹은 추천하는 선택지를 나타내는 <option> 요소를 여럿 담는다.

Button
<button> 요소는 클릭 가능한 버튼을 나타낸다. <form> 내부는 물론이고 버튼 기능이 필요한 곳이라면 어디든 배치 할 수 있다.

type
submit : 버튼이 서버로 양식 데이터를 제출한다 (기본값)
reset : <input type = 'reset'> 처럼, 모든 입력 필드를 초기값으로 되돌린다.
button 은 기본 행동이 없으며 주로 클릭한 후 자바스크립트 측 코드를 명령 할 때 사용된다.
 -->
